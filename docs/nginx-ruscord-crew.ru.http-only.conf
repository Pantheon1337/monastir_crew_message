# ВРЕМЕННО: только HTTP :80 → Node (без TLS), пока нет файлов сертификата.
# После загрузки купленного серта переключитесь на nginx-ruscord-crew.ru.conf
#
#   sudo cp docs/nginx-ruscord-crew.ru.http-only.conf /etc/nginx/sites-available/monastir-crew
#   sudo rm -f /etc/nginx/sites-enabled/ruscord-crew
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name ruscord-crew.ru www.ruscord-crew.ru;

    client_max_body_size 8M;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }
}
