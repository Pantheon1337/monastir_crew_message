# HTTPS: ruscord-crew.ru → Node (127.0.0.1:3001)
#
# Перед первым запуском ОБЯЗАТЕЛЬНО положите сертификат или сгенерируйте временный самоподписанный:
#
#   sudo mkdir -p /etc/ssl/ruscord-crew.ru
#   sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout /etc/ssl/ruscord-crew.ru/privkey.pem \
#     -out /etc/ssl/ruscord-crew.ru/fullchain.pem \
#     -subj "/CN=ruscord-crew.ru"
#   sudo chmod 640 /etc/ssl/ruscord-crew.ru/privkey.pem
#   sudo chown root:www-data /etc/ssl/ruscord-crew.ru/privkey.pem
#
# Потом замените fullchain/privkey на файлы от вашего CA (купленный серт).
#
# Установка:
#   sudo cp docs/nginx-ruscord-crew.ru.conf /etc/nginx/sites-available/monastir-crew
#   sudo ln -sf /etc/nginx/sites-available/monastir-crew /etc/nginx/sites-enabled/monastir-crew
#   sudo rm -f /etc/nginx/sites-enabled/ruscord-crew
#   sudo nginx -t && sudo systemctl reload nginx
#
# map не используем в vhost — иначе дублирование с другими файлами. WebSocket: см. Connection ниже.

# Редирект HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name ruscord-crew.ru www.ruscord-crew.ru;

    client_max_body_size 8M;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        return 301 https://ruscord-crew.ru$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ruscord-crew.ru www.ruscord-crew.ru;

    ssl_certificate     /etc/ssl/ruscord-crew.ru/fullchain.pem;
    ssl_certificate_key /etc/ssl/ruscord-crew.ru/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    client_max_body_size 8M;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }
}
